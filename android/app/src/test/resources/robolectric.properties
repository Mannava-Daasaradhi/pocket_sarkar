# Use Robolectric's native SQLite (compiled with FTS5) instead of the JVM stub.
# Required for FTS5 virtual tables in unit tests.
# Robolectric 4.13 ships SQLite 3.44+ which includes FTS5 on all platforms
# (Linux, macOS, Windows). sqlite-bundled is excluded from the test classpath
# in build.gradle.kts so it does not conflict with this mode.
# Use Robolectric's native SQLite (compiled with FTS5) instead of the JVM stub.
# Required for FTS5 virtual tables in unit tests.
# Robolectric 4.13 ships SQLite 3.44+ which includes FTS5 on all platforms (incl. Windows).
sdk=34
sqliteMode=NATIVE